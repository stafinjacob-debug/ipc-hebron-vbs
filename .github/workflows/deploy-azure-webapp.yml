# Deploy Next.js standalone build to Azure App Service (Linux).
# Prerequisites: configure GitHub Secrets listed in docs/CREDENTIALS-AND-CONFIG.md

name: Deploy to Azure Web App

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-azure-webapp.yml"

  workflow_dispatch: {}

concurrency:
  group: azure-webapp-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm ci

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Build standalone bundle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: npm run build:azure

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Kudu `curl …/api/zipdeploy` uses SCM username/password; many tenants disable SCM basic auth
      # (HTTP 401). `az webapp deploy` uses the signed-in principal (azure/login) instead.
      # Skip Linux startup-status polling; the smoke step below confirms the site is reachable.
      - name: Zip and deploy to Azure Web App
        working-directory: web/.next/standalone
        run: |
          set -euo pipefail
          zip -rq "$GITHUB_WORKSPACE/deploy-site.zip" .
          az webapp deploy \
            --resource-group rg-ipc-hebron-vbs-dev \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --src-path "$GITHUB_WORKSPACE/deploy-site.zip" \
            --type zip \
            --track-status false \
            --enable-kudu-warmup false \
            --timeout 1200000

      - name: Smoke check (production responds)
        run: |
          BASE="${{ secrets.AUTH_URL }}"
          BASE="${BASE%/}"
          for i in $(seq 1 40); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE/login" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "307" ]; then
              echo "OK HTTP $code"
              exit 0
            fi
            echo "attempt $i HTTP $code — waiting 15s…"
            sleep 15
          done
          echo "Site did not return OK within ~10 minutes"
          exit 1
