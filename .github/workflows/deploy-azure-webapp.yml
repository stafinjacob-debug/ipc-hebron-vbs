# Deploy Next.js standalone build to Azure App Service (Linux).
# Prerequisites: configure GitHub Secrets listed in docs/CREDENTIALS-AND-CONFIG.md

name: Deploy to Azure Web App

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-azure-webapp.yml"

  workflow_dispatch: {}

concurrency:
  group: azure-webapp-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm ci

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Build standalone bundle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: npm run build:azure

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Zip and deploy to Azure Web App
        working-directory: web/.next/standalone
        run: |
          zip -r "$GITHUB_WORKSPACE/deploy-site.zip" .
          az webapp deploy \
            --resource-group rg-ipc-hebron-vbs-dev \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --src-path "$GITHUB_WORKSPACE/deploy-site.zip" \
            --type zip
