# Deploy Next.js standalone build to Azure App Service (Linux).
# Prerequisites: configure GitHub Secrets listed in docs/CREDENTIALS-AND-CONFIG.md

name: Deploy to Azure Web App

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-azure-webapp.yml"

  workflow_dispatch: {}

concurrency:
  group: azure-webapp-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm ci

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Build standalone bundle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: npm run build:azure

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # OneDeploy (`az webapp deploy`) can poll "Starting the site…" for 10m and fail even when the
      # app is fine; `--track-status false` is ignored on some CLI builds. Kudu async zipdeploy
      # returns 202 immediately; we verify readiness in the smoke step below.
      - name: Zip and deploy (Kudu zipdeploy async)
        working-directory: web/.next/standalone
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          set -euo pipefail
          zip -rq "$GITHUB_WORKSPACE/deploy-site.zip" .
          CREDS=$(az webapp deployment list-publishing-credentials \
            --resource-group rg-ipc-hebron-vbs-dev \
            --name "$AZURE_WEBAPP_NAME" \
            -o json)
          SCM_USER=$(echo "$CREDS" | jq -r '.publishingUserName')
          SCM_PASS=$(echo "$CREDS" | jq -r '.publishingPassword')
          URL="https://${AZURE_WEBAPP_NAME}.scm.azurewebsites.net/api/zipdeploy?isAsync=true"
          code=$(curl -sS -o /tmp/zipdeploy-body.txt -w "%{http_code}" \
            -X POST \
            -u "$SCM_USER:$SCM_PASS" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$GITHUB_WORKSPACE/deploy-site.zip" \
            "$URL")
          echo "Kudu zipdeploy HTTP $code"
          if [ -s /tmp/zipdeploy-body.txt ]; then head -c 2000 /tmp/zipdeploy-body.txt; echo; fi
          if [ "$code" != "202" ] && [ "$code" != "200" ]; then
            echo "zipdeploy failed (expected HTTP 202 async or 200)"
            exit 1
          fi

      - name: Smoke check (production responds)
        run: |
          BASE="${{ secrets.AUTH_URL }}"
          BASE="${BASE%/}"
          for i in $(seq 1 40); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE/login" || echo 000)
            if [ "$code" = "200" ] || [ "$code" = "302" ] || [ "$code" = "307" ]; then
              echo "OK HTTP $code"
              exit 0
            fi
            echo "attempt $i HTTP $code — waiting 15s…"
            sleep 15
          done
          echo "Site did not return OK within ~10 minutes"
          exit 1
